name: Build Hekate
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    container: ghcr.io/devkitpro/switch-dev:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install 7-Zip
        run: apt-get update && apt-get install -y p7zip-full

      - name: Unzip source
        run: 7z x hekate-master.7z

      - name: Build
        run: cd hekate-master && make

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hekate
          path: hekate-master/hekate.bin
