name: Build Hekate
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full wget curl

      # 改用 GitHub 的 CDN 镜像，解决下载超时问题
      - name: Install devkitPro
        run: |
          wget https://github.com/devkitPro/pacman/releases/download/v1.0.2/devkitpro-pacman.deb --no-check-certificate
          sudo dpkg -i devkitpro-pacman.deb || sudo apt-get install -f -y
          sudo apt-get update
          sudo dkp-pacman -Syu --noconfirm switch-dev devkitARM

      - name: Unzip source
        run: 7z x hekate-master.7z

      - name: Build
        run: cd hekate-master && make

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hekate
          path: hekate-master/hekate.bin
