name: Build Hekate
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full curl

      # 用 devkitPro 官方脚本一键安装，解决链接失效问题
      - name: Install devkitPro
        run: |
          curl -L https://apt.devkitpro.org/install-devkitpro-pacman | sudo bash
          sudo apt-get update
          sudo dkp-pacman -Syu --noconfirm switch-dev devkitARM

      - name: Unzip source
        run: 7z x hekate-master.7z

      - name: Build
        run: cd hekate-master && make

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hekate
          path: hekate-master/hekate.bin
